<div id="menu_save_wrapper">

    <!-- 背景（固定） -->
    <style>
        /* セーブ画面全体を画面いっぱいに固定 */
        #menu_save_wrapper{
            position: fixed;
            left: 0; top: 0;
            width: 100vw; height: 100vh;
            z-index: 9999;
        }

        /* 背景レイヤー */
        #menu_save_wrapper .menu_bg{
            position: fixed;
            left: 0; top: 0;
            width: 100vw; height: 100vh;
            background: url("./tyrano/images/system/bg_base.png") no-repeat center center / cover;
            z-index: 0;
        }

        /* UIレイヤー（背景の上に乗せる） */
        #menu_save_wrapper .menu_fore{
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
    </style>

    <div class="menu_bg"></div>

    <div class="menu_fore">

        <!-- 閉じるボタン -->
        <div class="menu_item" style="float: right; margin: 50px 70px 0 0">
            <img class="menu_close" src="./tyrano/images/system/menu_button_close.png" />
        </div>

        <!-- スクロールボタン -->
        <div style="clear: both"></div>
        <img class="button_smart button_arrow_up" src="./tyrano/images/system/arrow_up.png" style="left: 670px; top: 20px" />
        <img class="button_smart button_arrow_down" src="./tyrano/images/system/arrow_down.png" style="left: 800px; top: 15px" />

        <!-- セーブデータリスト -->
        <div class="area_save_list">
            <ul class="save_list">
                {{for array_save}}
                <li class="save_display_area save_list_item" data-num="{{>num}}">
                    <span class="save_list_item_thumb">
                        {{if img_data != ""}}
                        <img src="{{>img_data}}" />
                        {{/if}}
                    </span>
                    <span class="save_list_item_area">
                        <span class="save_list_item_date">{{>save_date}}</span>
                        <span class="save_list_item_text">{{>title}}</span>
                    </span>
                </li>
                {{/for}}
            </ul>
        </div>

        <!-- タイトル画像 -->
        <img class="img_label img_label_save" src="./tyrano/images/system/label_save.png" />
